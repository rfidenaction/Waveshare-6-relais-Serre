<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Serre de Marie-Pierre</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #1976d2;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  background: #0d47a1;
  padding: 20px;
  border-radius: 10px;
  margin: 0 0 20px 0;
}

/* ── Bandeau connexion ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
  font-size: 0.95em;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #999;
  transition: background 0.4s;
}

.status-dot.connected { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
.status-dot.offline   { background: #f44336; }
.status-dot.connecting { background: #ff9800; }

/* ── État carte (Waveshare online/offline) ── */
.device-status {
  margin-bottom: 20px;
  font-size: 0.9em;
  opacity: 0.85;
}

/* ── Groupes par DataType ── */
.group-title {
  font-size: 1.1em;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.7;
  margin: 25px auto 10px auto;
  max-width: 600px;
  text-align: left;
  padding-left: 5px;
}

/* ── Cartes ── */
.card {
  background: rgba(255,255,255,0.2);
  margin: 10px auto;
  max-width: 600px;
  padding: 20px;
  border-radius: 15px;
}

.card-label {
  font-size: 0.95em;
  opacity: 0.85;
  margin-bottom: 8px;
}

.card .value {
  font-size: 1.8em;
  font-weight: bold;
}

.card .timestamp {
  font-size: 0.8em;
  margin-top: 10px;
  opacity: 0.7;
}

.card .timestamp em {
  font-style: italic;
}

/* ── Cartes vanne (interactives) ── */
.valve-card {
  background: rgba(255,255,255,0.2);
  margin: 10px auto;
  max-width: 600px;
  padding: 20px;
  border-radius: 15px;
}

.valve-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.valve-label {
  font-size: 1.1em;
  font-weight: bold;
}

.valve-state {
  font-size: 1em;
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
}

.valve-state.opened {
  background: #4caf50;
  color: white;
  font-weight: bold;
}

.valve-timestamp {
  font-size: 0.8em;
  opacity: 0.7;
  margin-bottom: 12px;
}

.duration-choices {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
}

.duration-btn {
  flex: 1;
  padding: 10px 4px;
  font-size: 1em;
  border: 2px solid rgba(255,255,255,0.4);
  background: transparent;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}

.duration-btn:hover {
  background: rgba(255,255,255,0.1);
}

.duration-btn.selected {
  background: #0d47a1;
  border-color: #0d47a1;
  font-weight: bold;
}

.action-btn {
  width: 100%;
  padding: 14px;
  font-size: 1.2em;
  font-weight: bold;
  background: #4caf50;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}

.action-btn:hover {
  background: #43a047;
}

.action-btn:active {
  background: #388e3c;
}

.action-btn:disabled {
  background: #9e9e9e;
  cursor: not-allowed;
}

/* ══ Familles — vue jardinier ══ */
.fam-card {
  background: rgba(255,255,255,0.2);
  margin: 10px auto;
  max-width: 600px;
  padding: 16px 20px;
  border-radius: 15px;
}
.fam-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.fam-name {
  font-size: 1.2em;
  font-weight: bold;
  cursor: pointer;
  border-bottom: 1px dashed rgba(255,255,255,0.4);
  padding-bottom: 2px;
}
.fam-valve-state {
  font-size: 1em;
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
}
.fam-valve-state.opened {
  background: #4caf50;
  color: white;
  font-weight: bold;
}
.fam-sensors {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
  font-size: 1.1em;
}
.fam-sensor-val {
  opacity: 0.9;
}
.fam-sensor-val strong {
  font-size: 1.2em;
}
.fam-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.fam-dur-btn {
  flex: 1;
  padding: 8px 4px;
  font-size: 0.95em;
  border: 2px solid rgba(255,255,255,0.4);
  background: transparent;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
.fam-dur-btn.selected {
  background: #0d47a1;
  border-color: #0d47a1;
  font-weight: bold;
}
.fam-water-btn {
  padding: 8px 16px;
  font-size: 1em;
  font-weight: bold;
  background: #4caf50;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.fam-water-btn:active { background: #388e3c; }
.fam-rename-input {
  font-size: 1.1em;
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  width: 160px;
}

/* ── Message d'attente ── */
.waiting {
  margin: 40px auto;
  max-width: 600px;
  font-size: 1.2em;
  opacity: 0.7;
}

.waiting .spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Flash sur mise à jour ── */
@keyframes flash {
  0%   { background: rgba(255,255,255,0.45); }
  100% { background: rgba(255,255,255,0.2); }
}
.card.flash, .valve-card.flash {
  animation: flash 0.6s ease-out;
}

/* ══ Gardener — Programmation arrosage ══ */
.gd-card {
  background: rgba(255,255,255,0.2);
  margin: 10px auto;
  max-width: 600px;
  padding: 20px;
  border-radius: 15px;
  text-align: left;
}
.gd-title {
  font-size: 1.1em;
  font-weight: bold;

}
.gd-header {

}
.gd-state {

}
.gd-state.opened {

}

.gd-slot-confirm {

.gd-slot-confirm-text {

}
.gd-slot-confirm-btns {

.gd-slot-confirm-yes {

.gd-toggle-btn {

.gd-drum-picker {

}

}

.gd-drum-pad { height: 40px; flex-shrink: 0; }

  justify-content: center;

  scroll-snap-align: center;

.gd-drum-item.active {

}
.gd-drum-highlight {

  height: 40px;
  border-top: 1.5px solid rgba(255,255,255,0.4);

}
.gd-drum-sep {

  padding: 0 2px;
}
.gd-slider-row {

}
.gd-slider-row label {

}

}

}

  display: flex;
  gap: 8px;
}
.gd-confirm-btn {
  flex: 1;
  padding: 12px;
  font-size: 1em;
  font-weight: bold;
  background: #4caf50;

  border: none;

}

}

.gd-picker-label {

<body>

<h1>Serre de Marie-Pierre</h1>

<!-- Bandeau connexion MQTT -->
<div class="status-bar">
  <span class="status-dot connecting" id="mqttDot"></span>
  <span id="mqttStatus">Connexion au broker…</span>
</div>

<!-- État carte Waveshare (LWT) -->
<div class="device-status" id="deviceStatus"></div>

<!-- Familles — vue jardinier -->
<div id="familySection" style="display:none;">
  <div class="group-title">Familles</div>
  <div id="familyCards"></div>
</div>

<!-- Conteneur des cartes (généré dynamiquement) -->
<div id="cards">
  <div class="waiting" id="waitingMsg">
    <span class="spinner"></span>
    En attente du schéma…
  </div>
</div>

<!-- Programmation arrosage automatique (Gardener) -->
<div id="gardenerSection" style="display:none;">
  <div class="group-title">Programmation arrosage</div>
  <div id="gardenerCards"></div>
</div>

<!-- mqtt.js CDN -->
<script src="https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js"></script>

<script>
// ══════════════════════════════════════════════════════════════
// Configuration
// ══════════════════════════════════════════════════════════════
const MQTT_URL  = 'wss://3db6155980d4483e8b8c3036fd0afd6f.s1.eu.hivemq.cloud:8884/mqtt';
const MQTT_USER = 'Graindesable';
const MQTT_PASS = 'Chaperonrouge64';

const TOPIC_SCHEMA = 'serre/schema';
const TOPIC_DATA   = 'serre/data/#';
const TOPIC_STATUS = 'serre/status/waveshare';

// Durées d'arrosage proposées (secondes)
const DURATION_CHOICES = [3, 5, 10, 30];
const DURATION_DEFAULT = 3;

// Mapping famille → DataIds associés
var FAMILIES = [
  { id: 1, valveId: 4,  cmdId: 17, moistureId: 3,  temperatureId: 23 },
  { id: 2, valveId: 12, cmdId: 18, moistureId: 24, temperatureId: 25 },
  { id: 3, valveId: 13, cmdId: 19, moistureId: 26, temperatureId: 27 },
  { id: 4, valveId: 14, cmdId: 20, moistureId: 28, temperatureId: 29 },
  { id: 5, valveId: 15, cmdId: 21, moistureId: 30, temperatureId: 31 },
  { id: 6, valveId: 16, cmdId: 22, moistureId: 32, temperatureId: 33 }
];
var familyNames = ['Famille', 'Famille', 'Famille', 'Famille', 'Famille', 'Famille'];
var familyCardsBuilt = false;

// ══════════════════════════════════════════════════════════════
// État local + restauration depuis localStorage
// ══════════════════════════════════════════════════════════════
let schema = null;
let lastValues = {};
let cardsBuilt = false;

// Durée sélectionnée par vanne : { dataId: seconds }
let selectedDurations = {};

// Dernier arrosage par cmdId : { cmdId: entry }
let lastWatering = {};

// Clés localStorage
var LS_SCHEMA = 'serre_schema';
var LS_VALUES = 'serre_values';
var LS_WATERING = 'serre_last_watering';

// Restaurer le cache
try {
  var cachedSchema = localStorage.getItem(LS_SCHEMA);
  if (cachedSchema) schema = JSON.parse(cachedSchema);

  var cachedValues = localStorage.getItem(LS_VALUES);
  if (cachedValues) lastValues = JSON.parse(cachedValues);

  var cachedWatering = localStorage.getItem(LS_WATERING);
  if (cachedWatering) lastWatering = JSON.parse(cachedWatering);
} catch (e) {
  console.warn('localStorage: erreur lecture cache', e);
}

// Sauvegarder le schéma
function saveSchema() {
  try { localStorage.setItem(LS_SCHEMA, JSON.stringify(schema)); }
  catch (e) { console.warn('localStorage: erreur écriture schéma', e); }
}

// Sauvegarder les dernières valeurs
function saveValues() {
  try { localStorage.setItem(LS_VALUES, JSON.stringify(lastValues)); }
  catch (e) { console.warn('localStorage: erreur écriture valeurs', e); }
}

// Sauvegarder les derniers arrosages
function saveWatering() {
  try { localStorage.setItem(LS_WATERING, JSON.stringify(lastWatering)); }
  catch (e) { console.warn('localStorage: erreur écriture watering', e); }
}

// Noms des groupes DataType
const TYPE_LABELS = {
  0: 'Alimentation',
  1: 'Capteurs',
  2: 'Actionneurs',
  3: 'Système'
};

// ══════════════════════════════════════════════════════════════
// DOM
// ══════════════════════════════════════════════════════════════
const mqttDot      = document.getElementById('mqttDot');
const mqttStatusEl = document.getElementById('mqttStatus');
const deviceStatus = document.getElementById('deviceStatus');
const cardsDiv     = document.getElementById('cards');
const waitingMsg   = document.getElementById('waitingMsg');

// ══════════════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════════════

function setMqttStatus(state, text) {
  mqttDot.className = 'status-dot ' + state;
  mqttStatusEl.textContent = text;
}

// Formater un timestamp UTC en heure locale
function formatUtcLocal(ts) {
  var d = new Date(ts * 1000);
  var dd = String(d.getDate()).padStart(2, '0');
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var yy = String(d.getFullYear()).slice(2);
  var hh = String(d.getHours()).padStart(2, '0');
  var mi = String(d.getMinutes()).padStart(2, '0');
  var ss = String(d.getSeconds()).padStart(2, '0');
  return dd + '/' + mm + '/' + yy + ' ' + hh + ':' + mi + ':' + ss;
}

// Formater un âge en ms en texte "Depuis Xh Ym Zs"
function formatAge(ageMs) {
  var s = Math.floor(ageMs / 1000);
  var m = Math.floor(s / 60); s %= 60;
  var h = Math.floor(m / 60); m %= 60;
  var text = 'Depuis ';
  if (h) text += h + 'h ';
  if (m) text += m + 'm ';
  text += s + 's';
  return text;
}

// Construire le HTML de l'horodatage
function timeHtml(entry) {
  if (entry.vclockAvailable && entry.vclockReliable) {
    return formatUtcLocal(entry.timestamp);
  }
  if (entry.vclockAvailable && !entry.vclockReliable) {
    return formatUtcLocal(entry.timestamp) + ' <em>(Imprécis)</em>';
  }
  var ageMs = Date.now() - entry.receivedAt;
  return '<span class="age" data-received="' + entry.receivedAt + '">' +
         formatAge(ageMs) + '</span>';
}

// Parser une ligne CSV 7 champs
function parseCsvPayload(csv) {
  csv = csv.trim();

  var commas = [];
  for (var i = 0; i < csv.length && commas.length < 6; i++) {
    if (csv[i] === ',') commas.push(i);
  }
  if (commas.length < 6) return null;

  var timestamp       = parseInt(csv.substring(0, commas[0]));
  var vclockAvailable = parseInt(csv.substring(commas[0] + 1, commas[1])) !== 0;
  var vclockReliable  = parseInt(csv.substring(commas[1] + 1, commas[2])) !== 0;
  var type            = parseInt(csv.substring(commas[2] + 1, commas[3]));
  var id              = parseInt(csv.substring(commas[3] + 1, commas[4]));
  var valueType       = parseInt(csv.substring(commas[4] + 1, commas[5]));
  var rawValue        = csv.substring(commas[5] + 1);

  var value;
  if (valueType === 0) {
    value = parseFloat(rawValue);
  } else {
    if (rawValue.length >= 2 && rawValue[0] === '"' && rawValue[rawValue.length - 1] === '"') {
      value = rawValue.substring(1, rawValue.length - 1).replace(/""/g, '"');
    } else {
      value = rawValue;
    }
  }

  return {
    timestamp: timestamp,
    vclockAvailable: vclockAvailable,
    vclockReliable: vclockReliable,
    type: type,
    id: id,
    valueType: valueType,
    value: value,
    receivedAt: Date.now()
  };
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

// ══════════════════════════════════════════════════════════════
// Détection "vanne" : Actionneur (type=2) de nature "etat"
// Basé sur META, aucune info en dur
// ══════════════════════════════════════════════════════════════
function isValve(di) {
  return di.type === 2 && di.nature === 'etat';
}

// ══════════════════════════════════════════════════════════════
// Construction des cartes depuis le schéma
// ══════════════════════════════════════════════════════════════

function buildCards() {
  if (!schema || !schema.dataIds) return;

  cardsDiv.innerHTML = '';
  cardsBuilt = true;

  // Regrouper par DataType
  var groups = {};
  schema.dataIds.forEach(function(di) {
    var t = di.type;
    if (!groups[t]) groups[t] = [];
    groups[t].push(di);
  });

  // Ordre des groupes
  [0, 1, 2, 3].forEach(function(typeId) {
    var items = groups[typeId];
    if (!items || items.length === 0) return;

    // Titre du groupe
    var label = TYPE_LABELS[typeId] || ('Type ' + typeId);
    if (schema.dataTypes) {
      schema.dataTypes.forEach(function(dt) {
        if (dt.id === typeId && dt.label) label = dt.label;
      });
    }

    var title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = label;
    cardsDiv.appendChild(title);

    items.forEach(function(di) {
      if (isValve(di)) {
        cardsDiv.appendChild(buildValveCard(di));
      } else {
        cardsDiv.appendChild(buildDataCard(di));
      }
    });
  });
}

// Carte de données (affichage simple, comportement existant)
function buildDataCard(di) {

// Carte vanne (interactive)
function buildValveCard(di) {
  if (!(di.id in selectedDurations)) {
    selectedDurations[di.id] = DURATION_DEFAULT;
  }

  var card = document.createElement('div');
  card.className = 'valve-card';
  card.id = 'card-' + di.id;

  var header = document.createElement('div');

  // Timestamp
  var ts = document.createElement('div');
  ts.className = 'valve-timestamp';
  ts.id = 'time-' + di.id;
  card.appendChild(ts);

  choices.className = 'duration-choices';

  });

// Sélection d'une durée pour une vanne
function selectDuration(dataId, sec) {
  selectedDurations[dataId] = sec;

  // Mettre à jour visuellement les boutons de cette vanne
  var card = document.getElementById('card-' + dataId);
  if (!card) return;
  var btns = card.querySelectorAll('.duration-btn');
  btns.forEach(function(b) {
    if (parseInt(b.dataset.sec) === sec) {
      b.classList.add('selected');
    } else {
      b.classList.remove('selected');
    }
  });
}

// Correspondance Vanne → Commande (figée selon META + RELAYS[] côté carte).
// Si on remplace un relais d'arrosage par un autre actionneur (lumière,
// ventilation...), il faudra ajuster cette table ET refaire l'UI en
// conséquence. C'est la seule duplication de RELAYS[] dans le code client.
var VALVE_TO_CMD = {
  4:  17,   // Valve1 → CommandValve1
  12: 18,   // Valve2 → CommandValve2
  13: 19,   // Valve3 → CommandValve3
  14: 20,   // Valve4 → CommandValve4
  15: 21,   // Valve5 → CommandValve5
  16: 22    // Valve6 → CommandValve6
};

// Type d'origine d'une commande émise depuis l'UI manuelle (cf. DataType
// dans DataLogger.h : 5 = CommandManual, 6 = CommandAuto).
var CMD_TYPE_MANUAL = 5;

// Publier une commande d'ouverture via MQTT.
// Payload : CSV 7 champs non horodaté. Les 3 premiers champs sont vides :
// la carte horodatera à réception via VirtualClock::read().
function sendValveCommand(valveId) {
  var cmdId = VALVE_TO_CMD[valveId];
  if (cmdId === undefined) {
    console.warn('Vanne sans commande associée : id=' + valveId);
    return;
  }

  var sec = selectedDurations[valveId] || DURATION_DEFAULT;
  var topic = 'serre/cmd';
  var payload = ',,,' + CMD_TYPE_MANUAL + ',' + cmdId + ',0,' + sec;

  if (!client || !client.connected) {
    console.warn('MQTT non connecté, commande ignorée');
    return;
  }

  client.publish(topic, payload, { qos: 1 }, function(err) {
    if (err) {
      console.error('Erreur publication commande :', err);
    } else {
      console.log('Commande envoyée :', topic, '=', payload);
    }
  });
}

function updateCard(entry) {
  if (!schema || !cardsBuilt) return;

  var di = null;
  schema.dataIds.forEach(function(d) {
    if (d.id === entry.id) di = d;
  });
  if (!di) return;

  var cardEl = document.getElementById('card-' + di.id);
  var timeEl = document.getElementById('time-' + di.id);

  if (isValve(di)) {
    // Carte vanne : mettre à jour l'état Fermée/Ouverte
    var stateEl = document.getElementById('state-' + di.id);
    if (stateEl) {
      var intVal = Math.round(entry.value);
      var display = String(entry.value);
      if (di.states) {
        di.states.forEach(function(s) {
          if (s.value === intVal) display = s.label;
        });
      }
      stateEl.textContent = display;
      if (intVal === 1) {
        stateEl.classList.add('opened');
      } else {
        stateEl.classList.remove('opened');
      }
    }
    if (timeEl) timeEl.innerHTML = timeHtml(entry);
  } else {
    // Carte de données classique
    var valueEl = document.getElementById('value-' + di.id);
    if (!valueEl) return;

    var display;
    if (di.nature === 'metrique') {
      display = entry.value.toFixed(1);
      if (di.unit) display += ' ' + di.unit;
    } else if (di.nature === 'etat') {
      display = String(entry.value);
      if (di.states) {
        var intVal = Math.round(entry.value);
        di.states.forEach(function(s) {
          if (s.value === intVal) display = s.label;
        });
      }
    } else {
      display = String(entry.value);
    }

    valueEl.textContent = display;
    if (timeEl) timeEl.innerHTML = timeHtml(entry);
  }

  // Flash visuel
  if (cardEl) {
    cardEl.classList.remove('flash');
    void cardEl.offsetWidth;
    cardEl.classList.add('flash');
  }

  lastValues[entry.id] = entry;
}

function refreshFamilyValues() {
  FAMILIES.forEach(function(fam) {
    if (lastValues[fam.moistureId]) updateFamilyMoisture(fam, lastValues[fam.moistureId]);
    if (lastValues[fam.temperatureId]) updateFamilyTemperature(fam, lastValues[fam.temperatureId]);
    if (lastValues[fam.valveId]) updateFamilyValve(fam, lastValues[fam.valveId]);
  });
}

function updateFamilyMoisture(fam, entry) {
  var el = document.getElementById('fam-moist-' + fam.id);
  if (el) el.textContent = entry.value.toFixed(1) + ' %';
}

function updateFamilyTemperature(fam, entry) {
  var el = document.getElementById('fam-temp-' + fam.id);
  if (el) el.textContent = entry.value.toFixed(1) + ' °C';
}

function updateFamilyValve(fam, entry) {
  var el = document.getElementById('fam-valve-' + fam.id);
  if (!el) return;
  var intVal = Math.round(entry.value);
  var stateLabel = intVal === 1 ? 'ouverte' : 'fermée';
  el.textContent = 'Vanne ' + stateLabel;
  if (intVal === 1) {
    el.classList.add('opened');
  } else {
    el.classList.remove('opened');
  }
}

function updateFamilyFromEntry(entry) {
  if (!familyCardsBuilt) return;
  for (var i = 0; i < FAMILIES.length; i++) {
    var fam = FAMILIES[i];
    if (entry.id === fam.moistureId) { updateFamilyMoisture(fam, entry); return; }
    if (entry.id === fam.temperatureId) { updateFamilyTemperature(fam, entry); return; }
    if (entry.id === fam.valveId) { updateFamilyValve(fam, entry); return; }
  }
}

function startFamilyRename(famId) {
  var nameEl = document.getElementById('fam-name-' + famId);
  if (!nameEl) return;

  var currentName = familyNames[famId - 1];
  var input = document.createElement('input');
  input.type = 'text';
  input.className = 'fam-rename-input';
  input.value = currentName;
  input.maxLength = 24;

  nameEl.textContent = famId + ' ';
  nameEl.appendChild(input);
  input.focus();
  input.select();

  function finish() {
    var newName = input.value.trim();
    if (!newName) newName = 'Famille';
    familyNames[famId - 1] = newName;
    nameEl.textContent = famId + ' ' + newName;

    if (client && client.connected) {
      var payload = JSON.stringify({ id: famId, name: newName });
      client.publish('serre/families/rename', payload, { qos: 1 });
    }
  }

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { input.value = currentName; input.blur(); }
  });
}

];

var gardenerSlots = [];

// Slider logarithmique : 100 positions → 5..900 secondes
function logSliderToSeconds(pos) {
  var raw = 5 * Math.pow(180, pos / 100);
  var step = raw < 30 ? 5 : raw < 120 ? 10 : raw < 300 ? 15 : 30;
  var snapped = Math.round(raw / step) * step;
  return Math.max(5, Math.min(900, snapped));
}

function formatGardenerDuration(sec) {
  sec = Math.round(sec);
  if (sec < 60) return sec + ' s';
  var m = Math.floor(sec / 60), s = sec % 60;
  return s === 0 ? m + ' min' : m + ' min ' + s + ' s';
}

function countGardenerSlotsForValve(cmdId) {
  var count = 0;
  for (var i = 0; i < gardenerSlots.length; i++) {
    if (gardenerSlots[i].cmdId === cmdId) count++;
  }
  return count;
}

function hasDuplicateGardenerSlot(cmdId, hour, minute) {
  for (var i = 0; i < gardenerSlots.length; i++) {
    if (gardenerSlots[i].cmdId === cmdId &&
        gardenerSlots[i].hour === hour &&
        gardenerSlots[i].minute === minute) return true;
  }
  return false;
}

function hasGardenerOverlap(cmdId, hour, minute, duration) {
  var start = hour * 60 + minute;
  var span = Math.ceil(duration / 60);
  for (var i = 0; i < gardenerSlots.length; i++) {
    var s = gardenerSlots[i];
    if (s.cmdId !== cmdId) continue;
    if (s.hour === hour && s.minute === minute) continue;
    var sStart = s.hour * 60 + s.minute;
    var sSpan = Math.ceil(s.duration / 60);
    for (var m = 0; m < span; m++) {
      var mine = (start + m) % 1440;
      for (var n = 0; n < sSpan; n++) {
        if (mine === (sStart + n) % 1440) return true;
      }
    }
  }
  return false;
}

function buildDrumColumn(parentEl, id, count, cmdId) {
  var col = document.createElement('div');
  col.className = 'gd-drum-col';

  var highlight = document.createElement('div');
  highlight.className = 'gd-drum-highlight';
  col.appendChild(highlight);

  var scroll = document.createElement('div');
  scroll.className = 'gd-drum-scroll';
  scroll.id = id;
  scroll.dataset.cmdid = cmdId;

  var padTop = document.createElement('div');
  padTop.className = 'gd-drum-pad';
  scroll.appendChild(padTop);

  for (var i = 0; i < count; i++) {
    var item = document.createElement('div');
    item.className = 'gd-drum-item';
    item.textContent = String(i).padStart(2, '0');
    item.dataset.val = i;
    item.addEventListener('click', (function(scrollEl, val) {
      return function() { scrollEl.scrollTop = val * 40; };
    })(scroll, i));
    scroll.appendChild(item);
  }

  var padBot = document.createElement('div');
  padBot.className = 'gd-drum-pad';
  scroll.appendChild(padBot);

  scroll.addEventListener('scroll', function() {
    updateDrumActive(scroll);
  });

  col.appendChild(scroll);
  parentEl.appendChild(col);
  return scroll;
}

// Variante avec pas : affiche i*step (ex. 00, 05, 10, …)
// getDrumValue retourne l'index ; le caller multiplie par step.
function buildDrumColumnStep(parentEl, id, count, cmdId, step) {
  var col = document.createElement('div');
  col.className = 'gd-drum-col';

  var highlight = document.createElement('div');
  highlight.className = 'gd-drum-highlight';
  col.appendChild(highlight);

  var scroll = document.createElement('div');
  scroll.className = 'gd-drum-scroll';
  scroll.id = id;
  scroll.dataset.cmdid = cmdId;

  var padTop = document.createElement('div');
  padTop.className = 'gd-drum-pad';
  scroll.appendChild(padTop);

  for (var i = 0; i < count; i++) {
    var item = document.createElement('div');
    item.className = 'gd-drum-item';
    item.textContent = String(i * step).padStart(2, '0');
    item.dataset.val = i;
    item.addEventListener('click', (function(scrollEl, idx) {
      return function() { scrollEl.scrollTop = idx * 40; };
    })(scroll, i));
    scroll.appendChild(item);
  }

  var padBot = document.createElement('div');
  padBot.className = 'gd-drum-pad';
  scroll.appendChild(padBot);

  scroll.addEventListener('scroll', function() {
    updateDrumActive(scroll);
  });

  col.appendChild(scroll);
  parentEl.appendChild(col);
  return scroll;
}

function updateDrumActive(scrollEl) {
  var idx = Math.round(scrollEl.scrollTop / 40);
  var items = scrollEl.querySelectorAll('.gd-drum-item');
  for (var i = 0; i < items.length; i++) {
    if (i === idx) {
      items[i].classList.add('active');
    } else {
      items[i].classList.remove('active');
    }
  }
}

function getDrumValue(id) {
  var el = document.getElementById(id);
  if (!el) return 0;
  return Math.max(0, Math.round(el.scrollTop / 40));
}

function setDrumValue(id, val) {
  var el = document.getElementById(id);
  if (!el) return;
  el.scrollTop = val * 40;
  setTimeout(function() {
    updateDrumActive(el);
  }, 30);
}

  var origin = entry.type === 6 ? 'AUTO' : 'MANUEL';
  el.innerHTML = 'Dernier arrosage :<br>' + escapeHtml(ts) + ' — ' + escapeHtml(dur) + ' — ' + origin;
}

  refreshAllLastWateringDisplays();
}

function updateGardenerCards() {
  GARDENER_VALVES.forEach(function(valve) {
    var slotList = document.getElementById('gd-slots-' + valve.cmdId);
    if (!slotList) return;
    slotList.innerHTML = '';

    var valveSlots = gardenerSlots.filter(function(s) {
      return s.cmdId === valve.cmdId;
    });
    valveSlots.sort(function(a, b) {
      return (a.hour * 60 + a.minute) - (b.hour * 60 + b.minute);
    });

    if (valveSlots.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'gd-empty';
      empty.textContent = 'Aucun créneau programmé';
      slotList.appendChild(empty);
    } else {
      valveSlots.forEach(function(s) {
        var item = document.createElement('div');
        item.className = 'gd-slot';

        var info = document.createElement('div');
        info.className = 'gd-slot-info';
        var time = document.createElement('span');
        time.className = 'gd-slot-time';
        time.textContent = String(s.hour).padStart(2, '0') + ':' + String(s.minute).padStart(2, '0');
        info.appendChild(time);
        var dur = document.createElement('span');
        dur.className = 'gd-slot-dur';
        dur.textContent = formatGardenerDuration(s.duration);
        info.appendChild(dur);
        item.appendChild(info);

        var delBtn = document.createElement('button');
        delBtn.className = 'gd-slot-del';
        delBtn.textContent = '✕';
        (function(cmdId, hour, minute, slotEl, slotList) {
          delBtn.addEventListener('click', function() {
            var confirmDiv = document.createElement('div');
            confirmDiv.className = 'gd-slot-confirm';

            var text = document.createElement('span');
            text.className = 'gd-slot-confirm-text';
            text.textContent = 'Supprimer ?';
            confirmDiv.appendChild(text);

            var btns = document.createElement('div');
            btns.className = 'gd-slot-confirm-btns';

            var yesBtn = document.createElement('button');
            yesBtn.className = 'gd-slot-confirm-yes';
            yesBtn.textContent = 'Oui';
            yesBtn.addEventListener('click', function() {
              yesBtn.classList.add('confirmed');
              yesBtn.disabled = true;
              removeGardenerSlot(cmdId, hour, minute);
            });
            btns.appendChild(yesBtn);

            var noBtn = document.createElement('button');
            noBtn.className = 'gd-slot-confirm-no';
            noBtn.textContent = 'Non';
            noBtn.addEventListener('click', function() {
              slotList.replaceChild(slotEl, confirmDiv);
            });
            btns.appendChild(noBtn);

            confirmDiv.appendChild(btns);
            slotList.replaceChild(confirmDiv, slotEl);
          });
        })(s.cmdId, s.hour, s.minute, item, slotList);
        item.appendChild(delBtn);

        slotList.appendChild(item);
      });
    }

    // Refermer le formulaire si l'état vient de changer
    var form = document.getElementById('gd-form-' + valve.cmdId);
    var toggle = document.getElementById('gd-toggle-' + valve.cmdId);
    if (form) form.classList.remove('open');
    if (toggle) toggle.style.display = '';
  });
}

function toggleGardenerForm(cmdId) {
  var form = document.getElementById('gd-form-' + cmdId);
  var toggle = document.getElementById('gd-toggle-' + cmdId);
  if (!form || !toggle) return;

  if (form.classList.contains('open')) {
    form.classList.remove('open');
    toggle.style.display = '';
  } else {
    form.classList.add('open');
    toggle.style.display = 'none';
    setTimeout(function() {
      setDrumValue('gd-hour-' + cmdId, 7);
      setDrumValue('gd-min-' + cmdId, 0);
      setDrumValue('gd-dur-min-' + cmdId, 1);
      setDrumValue('gd-dur-sec-' + cmdId, 0);
    }, 30);
  }
}

function confirmGardenerSlot(cmdId) {
  var hour     = getDrumValue('gd-hour-' + cmdId);
  var minute   = getDrumValue('gd-min-' + cmdId);
  var durMin   = getDrumValue('gd-dur-min-' + cmdId);
  var durSec   = getDrumValue('gd-dur-sec-' + cmdId) * 5;
  var duration = durMin * 60 + durSec;

  if (duration < 3) {
    showGardenerError(cmdId, 'Durée minimum : 3 secondes');
    return;
  }
  if (duration > 900) {
    showGardenerError(cmdId, 'Durée maximum : 15 minutes');
    return;
  }

  if (countGardenerSlotsForValve(cmdId) >= GARDENER_MAX_SLOTS_PER_VALVE) {
    showGardenerError(cmdId, 'Maximum 6 créneaux atteint pour cette vanne');
    return;
  }
  if (hasDuplicateGardenerSlot(cmdId, hour, minute)) {
    showGardenerError(cmdId, 'Un créneau existe déjà à cette heure');
    return;
  }
  if (hasGardenerOverlap(cmdId, hour, minute, duration)) {
    showGardenerError(cmdId, 'Ce créneau chevauche un créneau existant');
    return;
  }

  if (!client || !client.connected) {
    showGardenerError(cmdId, 'MQTT non connecté');
    return;
  }

  var payload = JSON.stringify({
    op: 'add',
    cmdId: cmdId,
    hour: hour,
    minute: minute,
    duration: duration,
    cancellableBySensor: false
  });
  client.publish(GARDENER_TOPIC_FROM_USER, payload, { qos: 1 });
}

function removeGardenerSlot(cmdId, hour, minute) {
  if (!client || !client.connected) return;

  var payload = JSON.stringify({
    op: 'remove',
    cmdId: cmdId,
    hour: hour,
    minute: minute
  });
  client.publish(GARDENER_TOPIC_FROM_USER, payload, { qos: 1 });
}

function handleGardenerState(payload) {
  try {
    var data = JSON.parse(payload);
    gardenerSlots = data.slots || [];
    if (gardenerBuilt) {
      updateGardenerCards();
    }
  } catch (e) {
    console.error('Erreur parsing Gardener ToUser:', e);
  }
}

function updateGardenerValveState(entry) {
  if (!gardenerBuilt) return;
  var entryId = parseInt(entry.id);
  for (var i = 0; i < GARDENER_VALVES.length; i++) {
    if (GARDENER_VALVES[i].entityId === entryId) {
      var el = document.getElementById('gd-state-' + entryId);
      if (!el) return;
      var intVal = Math.round(parseFloat(entry.value));
      var display = String(intVal);
      if (schema && schema.dataIds) {
        var di = null;
        schema.dataIds.forEach(function(d) {
          if (d.id === entryId) di = d;
        });
        if (di && di.states) {
          di.states.forEach(function(s) {
            if (s.value === intVal) display = s.label;
          });
        }
      }
      el.textContent = display;
      if (intVal === 1) {
        el.classList.add('opened');
      } else {
        el.classList.remove('opened');
      }
      return;
    }
  }
}

// ══════════════════════════════════════════════════════════════
// Restauration du cache au chargement
// ══════════════════════════════════════════════════════════════

if (schema) {
  waitingMsg.style.display = 'none';
  buildFamilyCards();
  buildCards();
  buildGardenerCards();
  Object.keys(lastValues).forEach(function(id) {
    updateCard(lastValues[id]);
    updateFamilyFromEntry(lastValues[id]);
    updateGardenerValveState(lastValues[id]);
  });
}

// ══════════════════════════════════════════════════════════════
// Connexion MQTT
// ══════════════════════════════════════════════════════════════

var clientId = 'serre-pwa-' + Math.random().toString(16).substr(2, 8);

var client = mqtt.connect(MQTT_URL, {
  username: MQTT_USER,
  password: MQTT_PASS,
  clientId: clientId,
  protocolVersion: 5,
  reconnectPeriod: 3000,
  clean: true
});

client.on('connect', function() {
  setMqttStatus('connected', 'Connecté au broker');
  client.subscribe([TOPIC_SCHEMA, TOPIC_DATA, TOPIC_STATUS, GARDENER_TOPIC_TO_USER], { qos: 1 });
});

client.on('reconnect', function() {
  setMqttStatus('connecting', 'Reconnexion…');
});

client.on('offline', function() {
  setMqttStatus('offline', 'Hors ligne');
});

client.on('error', function(err) {
  console.error('MQTT error:', err);
  setMqttStatus('offline', 'Erreur connexion');
});

client.on('message', function(topic, message) {
  var payload = message.toString().trim();

  // ── Schéma ──
  if (topic === TOPIC_SCHEMA) {
    try {
      schema = JSON.parse(payload);
      console.log('Schéma reçu:', schema);
      saveSchema();
      waitingMsg.style.display = 'none';
      buildFamilyCards();
      buildCards();
      buildGardenerCards();

      Object.keys(lastValues).forEach(function(id) {
        updateCard(lastValues[id]);
        updateFamilyFromEntry(lastValues[id]);
        updateGardenerValveState(lastValues[id]);
      });
    } catch (e) {
      console.error('Erreur parsing schéma:', e);
    }
    return;
  }

  // ── Statut Waveshare (LWT) ──
  if (topic === TOPIC_STATUS) {
    if (payload === 'online') {
      deviceStatus.textContent = '🟢 Carte Waveshare en ligne';
    } else {
      deviceStatus.textContent = '🔴 Carte Waveshare hors ligne';
    }
    return;
  }

  // ── Gardener (arrosage programmé) ──
  if (topic === GARDENER_TOPIC_TO_USER) {
    handleGardenerState(payload);
    return;
  }

  // ── Données capteurs ──
  if (topic.startsWith('serre/data/')) {
    var entry = parseCsvPayload(payload);
    if (!entry) {
      console.warn('CSV invalide:', payload);
      return;
    }

    lastValues[entry.id] = entry;
    saveValues();

    // Mémoriser le dernier arrosage (type 5 = Manuel, type 6 = Auto)
    if ((entry.type === 5 || entry.type === 6) && entry.id >= 17 && entry.id <= 22) {
      lastWatering[entry.id] = entry;
      saveWatering();
      updateLastWateringDisplay(entry.id);
    }

    updateFamilyFromEntry(entry);
    if (cardsBuilt) {
      updateCard(entry);
      updateGardenerValveState(entry);
    }
    return;
  }
});
</script>
