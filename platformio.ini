; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-relay-6ch]
platform = espressif32@6.3.0
board = esp32-s3-devkitc-1
framework = arduino
upload_port = COM6
upload_speed = 921600
monitor_speed = 115200
build_unflags = -std=gnu++11 -DARDUINO_USB_CDC_ON_BOOT=1
build_flags = 
    -std=gnu++17
    -DARDUINO_USB_CDC_ON_BOOT=0
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.partitions = partitions/custom_16MB_2MB_spiffs.csv
lib_deps =
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    me-no-dev/AsyncTCP
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.18.3

; ─────────────────────────────────────────────────────────────
; Chart.js embarqué en flash (PROGMEM)
; Le fichier est intégré au firmware, pas en SPIFFS.
; Accessible via les symboles _binary_embed_chart_umd_min_js_start/end
; Servi par la route /js/chart.min.js dans WebServer.cpp
; ─────────────────────────────────────────────────────────────
board_build.embed_txtfiles = embed/chart.umd.min.js